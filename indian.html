<html>
<head>
<title>food items</title>

<style>
body
{
  background: linear-gradient(90deg, rgba(109,151,117,1) 0%, rgba(166,123,92,1) 100%);
}

/* Grid layout */
.section-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

/* Section */
.section
{
    border:1px solid black;
    padding:10px;
}

/* Food items */
.food-item{
    text-align:center;
}

.food-item img{
    width:250px;
    height:160px;
    object-fit:cover;
    border-radius:8px;
    transition:0.3s;
}

.food-item img:hover{
    transform:scale(1.05);
}

.food-item p{
    margin:3px 0 0;
    font-size:13px;
    font-weight:bold;
}

h3{
    text-align:center;
}

/* Links */
a{
    text-decoration:none;
    color:black;
}

/* ORDER BUTTON */
.order
{
    width:200px;              /* 👈 width kam */
    margin:50px auto;         /* 👈 center */
    text-align:center;
    background: linear-gradient(90deg, rgba(131,58,180,1) 0%, rgba(252,176,69,1) 100%);
    border:1px solid black;
    border-radius:10px;
}

/* Make it button-like */
.order a{
    display:block;
    padding:12px;
    font-weight:bold;
}

/* Hover effect */

</style>

</head>

<body>

<div class="section">
<h3>🍛 Indian Cuisine</h3>

<div class="section-grid">

<div class="food-item">
<img src="biryani.jpg" onclick="window.open('https://en.wikipedia.org/wiki/Biryani','_blank')">
<p>Biryani</p>
</div>

<div class="food-item">
<img src="paneer.jpg" onclick="window.open('https://en.wikipedia.org/wiki/Paneer','_blank')">
<p>Paneer</p>
</div>

<div class="food-item">
<img src="thali.jpg" onclick="window.open('https://en.wikipedia.org/wiki/Thali','_blank')">
<p>Thali</p>
</div>

<div class="food-item">
<img src="butterchicken.jpg" onclick="window.open('https://en.wikipedia.org/wiki/Butter_chicken','_blank')">
<p>Butter Chicken</p>
</div>

</div>
</div>

<!-- ORDER BUTTON -->
<div class="order">
<a href="Iform.html">
<p>ORDER NOW</p>
</a>
</div>

<!-- Emoji Image -->
<img src="emoji.png" width="200px" height="190px">

</body>
</html>
